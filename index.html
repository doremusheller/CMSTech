<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CMS Technical Optimization</title>

<style>

:root{
  --bg:#000000;
  --gold:#c9a24d;
  --text:rgba(255,255,255,.94);
  --muted:rgba(255,255,255,.74);
  --max:1120px;
  --sans: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:var(--sans);
  color:var(--text);
  background:#000;
  overflow-x:hidden;
}

.wrap{
  max-width:var(--max);
  margin:auto;
  padding:0 20px;
}

.bg-canvas{
  position:fixed;
  inset:0;
  z-index:-1;
  opacity:.8;
}

header{
  position:sticky;
  top:0;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,.55);
  border-bottom:1px solid rgba(255,255,255,.06);
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--gold);
}

.name{
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
}

nav ul{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  gap:12px;
}

nav a{
  font-size:13px;
  color:rgba(255,255,255,.85);
  text-decoration:none;
}

main{
  min-height:calc(100vh - 64px);
  display:flex;
  align-items:center;
}

.hero{
  width:100%;
  text-align:center;
  padding:60px 0;
}

.banner{
  width:100%;
  max-width:980px;
  display:block;
  margin:auto;
}

h1{
  margin:40px auto 12px;
  max-width:26ch;
  font-size:clamp(30px,3.8vw,48px);
  line-height:1.05;
  letter-spacing:-.02em;
}

.subhead{
  margin:auto;
  max-width:60ch;
  color:var(--muted);
  font-size:16px;
  line-height:1.6;
}

.micro-divider{
  width:90px;
  height:1px;
  margin:22px auto;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

@media(max-width:900px){
  nav ul{display:none}
}

</style>
</head>

<body>

<canvas class="bg-canvas" id="network"></canvas>

<header>
<div class="wrap">
<div class="nav">

<div class="brand">
<div class="dot"></div>
<div class="name">CMS Technical Optimization</div>
</div>

<nav>
<ul>
<li><a href="#">AI Bootcamp</a></li>
<li><a href="#">Customized Business Intelligence</a></li>
<li><a href="#">Smart Team Training</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

</div>
</div>
</header>

<main>

<section class="hero">

<div class="wrap">

<img class="banner"
src="/assets/cms-banner-dark.png"
alt="CMS Technical Optimization">

<h1>Engineering practical AI systems for real organizations.</h1>

<p class="subhead">
AI strategy, infrastructure, and team capability—built for execution.
</p>

<div class="micro-divider"></div>

</div>

</section>

</main>

<script>

const canvas = document.getElementById("network");
const ctx = canvas.getContext("2d");

let w,h;
let nodes=[];
let links=[];

function resize(){
  w=canvas.width=window.innerWidth;
  h=canvas.height=window.innerHeight;

  nodes=[];
  links=[];

  for(let i=0;i<40;i++){
    nodes.push({
      x:Math.random()*w,
      y:Math.random()*h,
      vx:(Math.random()-.5)*0.2,
      vy:(Math.random()-.5)*0.2
    });
  }

  for(let i=0;i<70;i++){
    links.push([
      Math.floor(Math.random()*nodes.length),
      Math.floor(Math.random()*nodes.length)
    ]);
  }
}

function draw(){

ctx.clearRect(0,0,w,h);

for(let n of nodes){

n.x+=n.vx;
n.y+=n.vy;

if(n.x<0||n.x>w)n.vx*=-1;
if(n.y<0||n.y>h)n.vy*=-1;

ctx.fillStyle="rgba(255,255,255,.07)";
ctx.beginPath();
ctx.arc(n.x,n.y,2,0,Math.PI*2);
ctx.fill();

}

for(let l of links){

let a=nodes[l[0]];
let b=nodes[l[1]];

let dist=Math.hypot(a.x-b.x,a.y-b.y);

if(dist<250){

ctx.strokeStyle="rgba(255,255,255,.04)";
ctx.beginPath();
ctx.moveTo(a.x,a.y);
ctx.lineTo(b.x,b.y);
ctx.stroke();

}

}

requestAnimationFrame(draw);

}

window.addEventListener("resize",resize);

resize();
draw();

</script>

</body>
</html>
