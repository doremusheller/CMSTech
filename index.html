<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CMS Technical Optimization</title>

<style>

:root{
  --bg:#0b0b0c;
  --gold:#c9a24d;
  --max:1120px;
  --radius:18px;
  --shadow:0 18px 70px rgba(0,0,0,.55);
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  background:
    radial-gradient(1100px 700px at 20% 8%, rgba(201,162,77,.10), transparent 55%),
    radial-gradient(900px 520px at 82% 18%, rgba(255,255,255,.06), transparent 60%),
    var(--bg);
  color:white;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  overflow-x:hidden;
}

.bg-canvas{
  position:fixed;
  inset:0;
  z-index:-1;
  opacity:.75;
  pointer-events:none;
}

.wrap{
  max-width:var(--max);
  margin:auto;
  padding:0 20px;
}

header{
  position:sticky;
  top:0;
  backdrop-filter:blur(10px);
  background:rgba(11,11,12,.62);
  border-bottom:1px solid rgba(255,255,255,.06);
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--gold);
}

.name{
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
}

nav ul{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  gap:14px;
}

nav a{
  font-size:13px;
  color:rgba(255,255,255,.85);
  text-decoration:none;
}

main{
  min-height:calc(100vh - 64px);
  display:flex;
  align-items:center;
}

.hero{
  width:100%;
}

.kicker{
  text-align:center;
  font-size:12px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:rgba(255,255,255,.66);
  margin-bottom:14px;
}

.banner-card{
  margin:auto;
  max-width:980px;
  border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:var(--shadow);
  overflow:hidden;
}

.banner{
  width:100%;
  display:block;
}

</style>
</head>

<body>

<canvas class="bg-canvas" id="circuit"></canvas>

<header>
<div class="wrap">
<div class="nav">

<div class="brand">
<div class="dot"></div>
<div class="name">CMS Technical Optimization</div>
</div>

<nav>
<ul>
<li><a href="#">AI Bootcamp</a></li>
<li><a href="#">Customized Business Intelligence</a></li>
<li><a href="#">Smart Team Training</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

</div>
</div>
</header>

<main>

<section class="hero">
<div class="wrap">

<div class="kicker">AI Systems Lab</div>

<div class="banner-card">

<img
class="banner"
src="/assets/cms-banner-dark.png"
alt="CMS Technical Optimization banner"
>

</div>

</div>
</section>

</main>

<script>

const canvas = document.getElementById("circuit");
const ctx = canvas.getContext("2d");

let w,h;
let nodes=[];

function resize(){
  w=canvas.width=window.innerWidth;
  h=canvas.height=window.innerHeight;

  nodes=[];
  for(let i=0;i<40;i++){
    nodes.push({
      x:Math.random()*w,
      y:Math.random()*h,
      vx:(Math.random()-.5)*0.2,
      vy:(Math.random()-.5)*0.2
    });
  }
}

function draw(){

ctx.clearRect(0,0,w,h);

for(let n of nodes){

n.x+=n.vx;
n.y+=n.vy;

if(n.x<0||n.x>w)n.vx*=-1;
if(n.y<0||n.y>h)n.vy*=-1;

ctx.fillStyle="rgba(255,255,255,.12)";
ctx.beginPath();
ctx.arc(n.x,n.y,2,0,Math.PI*2);
ctx.fill();

}

requestAnimationFrame(draw);

}

window.addEventListener("resize",resize);

resize();
draw();

</script>

</body>
</html>
